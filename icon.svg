  <circle cx="350" cy="200" r="90" fill="none" stroke="#ffd43b" stroke-width="6" stroke-dasharray="140 350" stroke-dashoffset="-35"/>
  <circle cx="350" cy="200" r="90" fill="none" stroke="#ff6b6b" stroke-width="6" stroke-dasharray="50 350" stroke-dashoffset="-175"/>
  <circle cx="350" cy="200" r="90" fill="none" stroke="#4fc3f7" stroke-width="6" stroke-dasharray="80 350" stroke-dashoffset="-260"/>
