      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#339af0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  <!-- Pixel grid icon -->
  <rect x="80" y="100" width="200" height="200" fill="none" stroke="#4fc3f7" stroke-width="4" rx="8"/>
  <rect x="90" y="110" width="40" height="40" fill="#4fc3f7" rx="4"/>
  <rect x="140" y="110" width="40" height="40" fill="#40c057" rx="4"/>
  <rect x="190" y="110" width="40" height="40" fill="#ffd43b" rx="4"/>
  <rect x="240" y="110" width="30" height="40" fill="#7950f2" rx="4"/>
  <rect x="90" y="160" width="40" height="40" fill="#ff6b6b" rx="4"/>
  <rect x="140" y="160" width="40" height="40" fill="#22b8cf" rx="4"/>
  <rect x="190" y="160" width="40" height="40" fill="#f59f00" rx="4"/>
  <rect x="240" y="160" width="30" height="40" fill="#e64980" rx="4"/>
  <rect x="90" y="210" width="40" height="40" fill="#748ffc" rx="4"/>
  <rect x="140" y="210" width="40" height="40" fill="#20c997" rx="4"/>
